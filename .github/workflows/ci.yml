name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: cross-build (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build ./...

      - name: cross-build (darwin/amd64)
        run: GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build ./...
